# midi-pages live configuration. See config.toml.example for full docs.

[[device]]
name             = "Launchpad Mini MK3"
port_match       = "LPMiniMK3 MIDI)"
driver           = "mini_mk3"
mode             = "per_port"
pages            = 4
boot_sysex       = "F0 00 20 29 02 0D 0E 01 F7"

# Mode A: top-row arrows walk pages sequentially.
next_page_button     = { kind = "cc", number = 92 }
previous_page_button = { kind = "cc", number = 91 }

# Mode B: side-strip buttons jump directly to a page when tapped, and
# their LEDs indicate the active page.
page_buttons = [
  { kind = "cc", number = 89 },
  { kind = "cc", number = 79 },
  { kind = "cc", number = 69 },
  { kind = "cc", number = 59 },
]

# Mode C (off by default): set true to make the side-strip buttons
# preview a page only while held, reverting to the persistent page on
# release. Persistent page is then moved only via next/previous_page_button.
# page_buttons_hold_to_preview = true

name: ci

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

jobs:
  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt, llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - name: Install ALSA dev headers
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      - name: cargo fmt
        run: cargo fmt --all -- --check
      - name: cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: cargo test
        run: cargo test --all-features --locked
      - name: Coverage (Linux only)
        if: runner.os == 'Linux'
        run: |
          cargo install cargo-llvm-cov --locked
          # Exclude I/O glue (main.rs, ports.rs) — they need real MIDI hardware
          # to exercise. The state machine, parser, and config carry the gate.
          cargo llvm-cov \
            --all-features \
            --ignore-filename-regex '(main|ports)\.rs$' \
            --fail-under-lines 80 \
            --lcov --output-path lcov.info
      - name: Upload coverage
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: lcov.info

  build:
    name: build (${{ matrix.target }})
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: .exe
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            ext: ''
          - os: macos-latest
            target: aarch64-apple-darwin
            ext: ''
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Install ALSA dev headers
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      - name: cargo build --release
        run: cargo build --release --locked --target ${{ matrix.target }}
      - name: Stage release files
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/midi-pages${{ matrix.ext }}" "dist/midi-pages${{ matrix.ext }}"
          cp README.md LICENSE config.toml.example dist/
      # Upload the loose staged files. actions/upload-artifact@v4 always
      # wraps the artifact contents in a single zip on download from the
      # workflow page, so pre-archiving here would double-zip. The release
      # job below repackages into platform-native formats (.zip for
      # Windows, .tar.gz for Linux/macOS) for tagged releases.
      - uses: actions/upload-artifact@v4
        with:
          name: midi-pages-${{ matrix.target }}
          path: dist/

  release:
    name: release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Repackage per-platform release archives
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          for dir in artifacts/midi-pages-*; do
            target="$(basename "$dir")"
            if [[ "$target" == *windows* ]]; then
              (cd "$dir" && zip -r "${GITHUB_WORKSPACE}/release-assets/${target}.zip" .)
            else
              tar -C "$dir" -czf "release-assets/${target}.tar.gz" .
            fi
          done
          ls -la release-assets/
      - uses: softprops/action-gh-release@v2
        with:
          files: release-assets/midi-pages-*.*
          generate_release_notes: true
